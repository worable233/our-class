name: Release Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all platforms
        run: |
          cd installer
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/installer/ourclass-installer-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/installer/ourclass-installer-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/installer/ourclass-installer-darwin-arm64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/installer/ourclass-installer-linux-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*
          generate_release_notes: true
