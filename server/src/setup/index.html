<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurClass 安装向导</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:#fbf9f5; color:rgba(0,0,0,.9); min-height:100vh; display:flex; flex-direction:column; }
header { background:#fff; border-bottom:1px solid rgba(0,0,0,.08); padding:16px 32px; display:flex; align-items:center; gap:10px; }
header h1 { font-size:18px; font-weight:600; }
header span { color:rgba(0,0,0,.4); font-size:13px; }
.container { max-width:640px; margin:0 auto; padding:48px 24px; flex:1; width:100%; }
.steps { display:flex; gap:0; margin-bottom:40px; justify-content:center; }
.step { display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; font-size:13px; color:rgba(0,0,0,.4); }
.step.active { color:rgba(0,0,0,.9); background:rgba(94,106,210,.08); font-weight:600; }
.step.done { color:#16a34a; }
.step-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
             font-size:12px; font-weight:600; background:rgba(0,0,0,.08); color:rgba(0,0,0,.6); }
.step.active .step-num { background:#5E6AD2; color:#fff; }
.step.done .step-num { background:#16a34a; color:#fff; }
.step-divider { width:40px; height:1px; background:rgba(0,0,0,.12); margin:0 4px; }
.card { background:#fff; border-radius:12px; border:1px solid rgba(0,0,0,.08); padding:32px; margin-bottom:24px; }
.card h2 { font-size:20px; font-weight:600; margin-bottom:4px; }
.card p { font-size:14px; color:rgba(0,0,0,.5); margin-bottom:24px; line-height:1.5; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:4px; color:rgba(0,0,0,.7); }
.form-group input, .form-group select { width:100%; padding:10px 12px; border:1px solid rgba(0,0,0,.12);
  border-radius:8px; font-size:14px; outline:none; transition:border-color .15s; background:#fff; color:rgba(0,0,0,.9); }
.form-group input:focus, .form-group select:focus { border-color:#5E6AD2; box-shadow:0 0 0 2px rgba(94,106,210,.1); }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }
.btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; }
.btn { padding:10px 24px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer;
       border:1px solid rgba(0,0,0,.1); background:#fff; color:rgba(0,0,0,.8); transition:all .12s; }
.btn:hover { background:rgba(0,0,0,.05); }
.btn-primary { background:#5E6AD2; color:#fff; border-color:#5E6AD2; }
.btn-primary:hover { background:#7C7FDC; }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }
.alert { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
.alert-info { background:rgba(94,106,210,.08); color:#5E6AD2; }
.alert-success { background:rgba(22,163,74,.08); color:#16a34a; }
.alert-error { background:rgba(220,38,38,.08); color:#dc2626; }
.log { background:rgba(0,0,0,.04); border-radius:8px; padding:12px; font-size:12px; line-height:1.6;
       font-family:monospace; max-height:200px; overflow-y:auto; white-space:pre-wrap; margin-top:12px; }
.log .ok { color:#16a34a; }
.log .err { color:#dc2626; }
.log .info { color:rgba(0,0,0,.5); }
.hidden { display:none; }
.loading::after { content:'...'; animation:dots 1.2s infinite; }
@keyframes dots { 0%,20% { content:'.'; } 40% { content:'..'; } 60%,100% { content:'...'; } }
.summary-item { display:flex; justify-content:space-between; padding:8px 0; font-size:14px; border-bottom:1px solid rgba(0,0,0,.06); }
.summary-item:last-child { border-bottom:none; }
.summary-item .label { color:rgba(0,0,0,.5); }
.summary-item .value { font-weight:500; }
</style>
</head>
<body>

<header>
  <h1>OurClass</h1>
  <span>班级管理系统 — 安装向导</span>
</header>

<div class="container">
  <!-- Steps indicator -->
  <div class="steps" id="steps">
    <div class="step active" data-step="0"><div class="step-num">1</div>环境检测</div>
    <div class="step-divider"></div>
    <div class="step" data-step="1"><div class="step-num">2</div>管理员</div>
    <div class="step-divider"></div>
    <div class="step" data-step="2"><div class="step-num">3</div>API 配置</div>
    <div class="step-divider"></div>
    <div class="step" data-step="3"><div class="step-num">4</div>部署</div>
  </div>

  <!-- Step 0: Check env -->
  <div class="card step-panel" id="step0">
    <h2>环境检测</h2>
    <p>检测运行环境，确保一切就绪</p>
    <div class="log" id="envLog"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkEnv()" id="checkEnvBtn">开始检测</button>
    </div>
  </div>

  <!-- Step 1: Create admin -->
  <div class="card step-panel hidden" id="step1">
    <h2>创建管理员账号</h2>
    <p>设置系统的超级管理员，拥有全部权限</p>
    <div class="form-row">
      <div class="form-group">
        <label>用户名</label>
        <input id="adminUser" value="admin" placeholder="登录用户名">
      </div>
      <div class="form-group">
        <label>显示名称</label>
        <input id="adminName" value="管理员" placeholder="显示名称">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>密码</label>
        <input id="adminPass" type="password" value="123456" placeholder="密码">
      </div>
      <div class="form-group">
        <label>班级（可选）</label>
        <input id="adminClass" placeholder="如: 高三(1)班">
      </div>
    </div>
    <div id="adminAlert" class="hidden"></div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()">上一步</button>
      <button class="btn btn-primary" onclick="createAdmin()">创建管理员</button>
    </div>
  </div>

  <!-- Step 2: API config -->
  <div class="card step-panel hidden" id="step2">
    <h2>AI 接口配置</h2>
    <p>配置 AI 对话服务的 API Key，可在设置页中修改</p>
    <div class="form-group">
      <label>接口提供商</label>
      <select id="apiProvider">
        <option value="anthropic">Anthropic（Claude）</option>
        <option value="openai">OpenAI 兼容（DeepSeek / GPT / GLM）</option>
      </select>
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input id="apiKey" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label>模型</label>
      <input id="apiModel" value="claude-sonnet-4-20250514" placeholder="模型名称">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>API 地址（可选）</label>
        <input id="apiUrl" placeholder="默认留空">
      </div>
      <div class="form-group">
        <label>服务端口</label>
        <input id="appPort" type="number" value="3000" placeholder="3000">
      </div>
    </div>
    <div id="configAlert" class="hidden"></div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()">上一步</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <!-- Step 3: Apply -->
  <div class="card step-panel hidden" id="step3">
    <h2>部署服务</h2>
    <p>确认配置并启动服务</p>
    <div id="summary"></div>
    <div class="form-group" style="margin-top:16px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="usePm2" checked>
        使用 PM2 进程管理（推荐，支持开机自启）
      </label>
    </div>
    <div class="log hidden" id="applyLog"></div>
    <div id="applyAlert" class="hidden"></div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()">上一步</button>
      <button class="btn btn-primary" onclick="applySetup()" id="applyBtn">完成安装</button>
    </div>
  </div>
</div>

<script>
const API = '/api/setup'
let state = { step: 'idle' }

function log(el, msg, type='info') {
  const d = document.createElement('div')
  d.className = type
  d.textContent = msg
  document.getElementById(el).appendChild(d)
}

function showStep(n) {
  document.querySelectorAll('.step-panel').forEach(el => el.classList.add('hidden'))
  document.getElementById('step' + n).classList.remove('hidden')
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.remove('active', 'done')
    if (i < n) el.classList.add('done')
    if (i === n) el.classList.add('active')
  })
}

function nextStep() {
  const cur = document.querySelector('.step.active')
  const n = parseInt(cur.dataset.step) + 1
  if (n <= 3) showStep(n)
}

function prevStep() {
  const cur = document.querySelector('.step.active')
  const n = parseInt(cur.dataset.step) - 1
  if (n >= 0) showStep(n)
}

// Step 0: Check environment
async function checkEnv() {
  const btn = document.getElementById('checkEnvBtn')
  btn.disabled = true
  btn.textContent = '检测中...'
  document.getElementById('envLog').innerHTML = ''

  log('envLog', '正在检测运行环境...', 'info')
  try {
    const res = await fetch(API + '/check-env', { method: 'POST' })
    const data = await res.json()
    log('envLog', `${data.node ? '✅' : '❌'} Node.js: ${data.node ? '已安装' : '未安装'}`, data.node ? 'ok' : 'err')
    log('envLog', `${data.npm ? '✅' : '❌'} npm: ${data.npm ? '已安装' : '未安装'}`, data.npm ? 'ok' : 'err')
    log('envLog', `${data.git ? '✅' : '❌'} Git: ${data.git ? '已安装' : '未安装'}`, data.git ? 'ok' : 'err')

    if (data.step === 'done') {
      log('envLog', '检测到已完成安装，跳过配置向导。', 'info')
      btn.textContent = '进入系统'
      btn.onclick = () => { window.location.href = '/' }
      btn.disabled = false
      return
    }

    setTimeout(nextStep, 800)
  } catch (e) {
    log('envLog', '❌ 检测失败: ' + e.message, 'err')
    btn.disabled = false
    btn.textContent = '重试'
  }
}

// Step 1: Create admin
async function createAdmin() {
  const username = document.getElementById('adminUser').value.trim()
  const password = document.getElementById('adminPass').value
  const display_name = document.getElementById('adminName').value.trim() || username
  const stuClass = document.getElementById('adminClass').value.trim()
  const alert = document.getElementById('adminAlert')

  if (!username || !password) { alert.className = 'alert alert-error'; alert.textContent = '用户名和密码不能为空'; alert.classList.remove('hidden'); return }
  alert.classList.add('hidden')

  try {
    const res = await fetch(API + '/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, display_name, class: stuClass }),
    })
    const data = await res.json()
    if (!res.ok) { alert.className = 'alert alert-error'; alert.textContent = data.error; alert.classList.remove('hidden'); return }
    alert.className = 'alert alert-success'; alert.textContent = '✅ 管理员账号已创建'; alert.classList.remove('hidden')
    setTimeout(nextStep, 800)
  } catch (e) { alert.className = 'alert alert-error'; alert.textContent = '❌ ' + e.message; alert.classList.remove('hidden') }
}

// Step 2: Save config
async function saveConfig() {
  const api_key = document.getElementById('apiKey').value.trim()
  const provider = document.getElementById('apiProvider').value
  const model = document.getElementById('apiModel').value.trim()
  const api_url = document.getElementById('apiUrl').value.trim()
  const port = parseInt(document.getElementById('appPort').value) || 3000
  const alert = document.getElementById('configAlert')

  alert.classList.add('hidden')
  try {
    const res = await fetch(API + '/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key, provider, model, api_url, port }),
    })
    const data = await res.json()
    if (!res.ok) { alert.className = 'alert alert-error'; alert.textContent = data.error; alert.classList.remove('hidden'); return }
    alert.className = 'alert alert-success'; alert.textContent = '✅ 配置已保存'; alert.classList.remove('hidden')
    renderSummary({ username: document.getElementById('adminUser').value, port, provider, model, api_key: !!api_key })
    setTimeout(nextStep, 600)
  } catch (e) { alert.className = 'alert alert-error'; alert.textContent = '❌ ' + e.message; alert.classList.remove('hidden') }
}

function renderSummary(d) {
  document.getElementById('summary').innerHTML = `
    <div class="summary-item"><span class="label">管理员</span><span class="value">${d.username}</span></div>
    <div class="summary-item"><span class="label">服务端口</span><span class="value">${d.port}</span></div>
    <div class="summary-item"><span class="label">AI 提供商</span><span class="value">${d.provider}</span></div>
    <div class="summary-item"><span class="label">AI 模型</span><span class="value">${d.model}</span></div>
    <div class="summary-item"><span class="label">API Key</span><span class="value">${d.api_key ? '✅ 已配置' : '⚠️ 未配置（可在设置页补充）'}</span></div>
  `
}

// Step 3: Apply
async function applySetup() {
  const use_pm2 = document.getElementById('usePm2').checked
  const btn = document.getElementById('applyBtn')
  const logEl = document.getElementById('applyLog')
  logEl.classList.remove('hidden')
  logEl.innerHTML = ''
  btn.disabled = true
  btn.textContent = '部署中...'

  log('applyLog', '正在应用配置...', 'info')

  try {
    const res = await fetch(API + '/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ use_pm2 }),
    })
    const data = await res.json()

    if (!res.ok) {
      log('applyLog', '❌ ' + (data.error || '部署失败'), 'err')
      btn.disabled = false
      btn.textContent = '重试'
      return
    }

    log('applyLog', `✅ 部署成功！`, 'ok')
    log('applyLog', `服务端口: ${data.port}`, 'ok')
    log('applyLog', `PM2: ${data.pm2 ? '已安装并启动' : '未使用'}`, 'ok')
    log('applyLog', `\n访问 http://localhost:${data.port} 进入系统`, 'info')

    const alert = document.getElementById('applyAlert')
    alert.className = 'alert alert-success'
    alert.innerHTML = `✅ 安装完成！<br>访问 <a href="http://localhost:${data.port}" target="_blank">http://localhost:${data.port}</a> 进入系统`
    alert.classList.remove('hidden')
    btn.textContent = '完成'
    btn.disabled = true
  } catch (e) {
    log('applyLog', '❌ ' + e.message, 'err')
    btn.disabled = false
    btn.textContent = '重试'
  }
}

// Check if already done
fetch(API + '/status').then(r => r.json()).then(s => {
  if (s.step === 'done') {
    document.getElementById('step0').querySelector('p').textContent = '系统已完成安装，可以直接使用。'
    document.getElementById('checkEnvBtn').textContent = '进入系统'
    document.getElementById('checkEnvBtn').onclick = () => { window.location.href = '/' }
  }
})
</script>
</body>
</html>
